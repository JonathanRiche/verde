name: AUR Sync

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync, for example v0.1.5
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync-verde-bin:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event.release.tag_name != ''

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AUR SSH key
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "AUR_SSH_PRIVATE_KEY secret is required" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR repository
        shell: bash
        run: |
          git clone ssh://aur@aur.archlinux.org/verde-bin.git /tmp/verde-bin-aur

      - name: Update AUR package metadata
        shell: bash
        run: |
          bash ./scripts/release/update-aur-verde-bin.sh "${{ steps.tag.outputs.value }}" /tmp/verde-bin-aur

      - name: Commit and push AUR update
        shell: bash
        run: |
          cd /tmp/verde-bin-aur
          if git diff --quiet; then
            echo "No AUR changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update verde-bin to ${{ steps.tag.outputs.value }}"
          git push origin master
