name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: release-linux-x86_64
            package_script: scripts/release/package-linux.sh
            zig_download: https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
            zig_dir: zig-x86_64-linux-0.15.2
          - os: macos-15-intel
            artifact_name: release-macos-x86_64
            package_script: scripts/release/package-macos-app.sh
            zig_download: https://ziglang.org/download/0.15.2/zig-x86_64-macos-0.15.2.tar.xz
            zig_dir: zig-x86_64-macos-0.15.2
          - os: macos-14
            artifact_name: release-macos-arm64
            package_script: scripts/release/package-macos-app.sh
            zig_download: https://ziglang.org/download/0.15.2/zig-aarch64-macos-0.15.2.tar.xz
            zig_dir: zig-aarch64-macos-0.15.2

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            ~/.cargo/registry
            ~/.cargo/git
            vendor/fff/target
          key: ${{ runner.os }}-${{ runner.arch }}-release-zig-cache-${{ hashFiles('packages/desktop/build.zig.zon', 'packages/desktop/build.zig', 'build.zig', 'vendor/fff/Cargo.lock', 'vendor/fff/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-release-zig-cache-

      - name: Install Zig
        shell: bash
        run: |
          curl -fL --retry 5 --retry-delay 2 "${{ matrix.zig_download }}" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/${{ matrix.zig_dir }}" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            curl \
            libgl1-mesa-dev

      - name: Compute release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release artifact
        shell: bash
        run: |
          mkdir -p dist
          for attempt in 1 2 3; do
            if bash "${{ matrix.package_script }}" "${{ steps.version.outputs.value }}" dist; then
              exit 0
            fi
            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi
            echo "Retrying release build after transient failure (attempt $attempt)"
            sleep 15
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  publish:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
