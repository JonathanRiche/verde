<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Verde macOS WKWebView input regression smoke</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 32px;
      max-width: 980px;
    }

    label {
      display: block;
      margin: 0 0 16px;
    }

    input,
    textarea {
      box-sizing: border-box;
      display: block;
      font: inherit;
      margin-top: 6px;
      padding: 10px;
      width: min(680px, 100%);
    }

    textarea {
      height: 120px;
    }

    button {
      font: inherit;
      margin: 0 8px 12px 0;
      padding: 8px 12px;
    }

    #click-target,
    #scroll-target {
      border: 1px solid color-mix(in srgb, CanvasText 24%, transparent);
      border-radius: 6px;
      margin: 16px 0;
      padding: 14px;
      width: min(680px, 100%);
    }

    #scroll-target {
      height: 150px;
      overflow: auto;
    }

    #scroll-filler {
      height: 520px;
      padding-top: 220px;
    }

    pre {
      background: color-mix(in srgb, CanvasText 8%, transparent);
      border-radius: 6px;
      min-height: 260px;
      overflow: auto;
      padding: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1 id="title">WKWebView input smoke</h1>
  <label>
    Input
    <input id="smoke-input" autocomplete="off" autofocus>
  </label>
  <label>
    Textarea
    <textarea id="smoke-textarea"></textarea>
  </label>
  <div>
    <button id="reset-log" type="button">Reset log</button>
    <button id="copy-seed" type="button">Set copy seed</button>
  </div>
  <div id="click-target" tabindex="0">
    Click target for normal and modifier-click testing.
  </div>
  <div id="scroll-target" tabindex="0">
    <div id="scroll-filler">Scroll target for wheel and modifier-wheel testing.</div>
  </div>
  <pre id="event-log"></pre>
  <script>
    const input = document.getElementById("smoke-input");
    const textarea = document.getElementById("smoke-textarea");
    const clickTarget = document.getElementById("click-target");
    const scrollTarget = document.getElementById("scroll-target");
    const logNode = document.getElementById("event-log");
    const events = [];

    function compactEvent(event) {
      return {
        type: event.type,
        key: event.key,
        code: event.code,
        data: event.data,
        inputType: event.inputType,
        target: event.target && event.target.id ? event.target.id : event.target.tagName,
        value: event.target && "value" in event.target ? event.target.value : undefined,
        selection: event.target && "selectionStart" in event.target
          ? [event.target.selectionStart, event.target.selectionEnd]
          : undefined,
        button: event.button,
        buttons: event.buttons,
        deltaX: event.deltaX,
        deltaY: event.deltaY,
        metaKey: event.metaKey,
        ctrlKey: event.ctrlKey,
        altKey: event.altKey,
        shiftKey: event.shiftKey,
        scrollTop: event.currentTarget === scrollTarget ? scrollTarget.scrollTop : undefined,
      };
    }

    function record(event, extra) {
      const entry = Object.assign({ index: events.length + 1 }, compactEvent(event), extra || {});
      events.push(entry);
      logNode.textContent = JSON.stringify(events.slice(-80), null, 2);
    }

    for (const node of [input, textarea]) {
      for (const name of [
        "keydown",
        "keyup",
        "beforeinput",
        "input",
        "paste",
        "copy",
        "cut",
        "compositionstart",
        "compositionupdate",
        "compositionend",
      ]) {
        node.addEventListener(name, record);
      }
    }

    clickTarget.addEventListener("mousedown", record);
    clickTarget.addEventListener("mouseup", record);
    clickTarget.addEventListener("click", record);
    scrollTarget.addEventListener("wheel", record, { passive: true });
    scrollTarget.addEventListener("scroll", (event) => record(event, { scrollTop: scrollTarget.scrollTop }));

    document.getElementById("reset-log").addEventListener("click", () => {
      events.length = 0;
      input.value = "";
      textarea.value = "";
      scrollTarget.scrollTop = 0;
      logNode.textContent = "";
      input.focus();
    });

    document.getElementById("copy-seed").addEventListener("click", () => {
      input.value = "CopySeed";
      input.focus();
      input.setSelectionRange(0, input.value.length);
    });

    window.verdeInputSmokeResult = function () {
      return JSON.stringify({
        active: document.activeElement ? document.activeElement.id : null,
        input: input.value,
        inputSelection: [input.selectionStart, input.selectionEnd],
        textarea: textarea.value,
        textareaSelection: [textarea.selectionStart, textarea.selectionEnd],
        clickTargetFocused: document.activeElement === clickTarget,
        scrollTop: scrollTarget.scrollTop,
        eventCount: events.length,
        recentEvents: events.slice(-20),
        url: location.href,
      });
    };
  </script>
</body>
</html>
